<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Spy | Phantom Image Gallery</title>
    <meta name="description" content="Securely share images with end-to-end encryption. Encrypt your photos into emojis and share them with a self-destructing link.">
    
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="Emoji Spy - Phantom Gallery">
    <meta property="og:description" content="Secure, ephemeral, and encrypted image sharing.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km6VRDx6Rn9NIHr92H1PZtp2baAR6M9SXL3O6wK07d2f9Vof604HgzZiGMo279f8jgGlqMEw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="background-scanlines"></div>
    
    <main class="app-container" id="main-app">
        <header class="hero-section">
            <h1 class="glitch-text" data-text="EMOJI SPY">EMOJI SPY</h1>
            <p class="subtitle">Phantom Gallery Intelligence Tool</p>
        </header>

        <nav class="mode-toggle">
            <button id="nav-encrypt" class="nav-btn active">
                <span class="nav-icon">🔒</span>
                <span class="nav-text">Encrypt</span>
            </button>
            <button id="nav-decrypt" class="nav-btn">
                <span class="nav-icon">🔓</span>
                <span class="nav-text">Decrypt</span>
            </button>
        </nav>

        <div class="content-wrapper">
            <!-- SENDER SECTION -->
            <section class="pane sender-pane active" id="sender-section">
                <div class="pane-header">
                    <span class="icon">🔒</span>
                    <h2>Agent Sender</h2>
                </div>
                
                <div class="input-group">
                    <label for="image-picker">Capture Intelligence (Image)</label>
                    <div class="file-drop-zone" id="drop-zone">
                        <input type="file" id="image-picker" accept="image/*">
                        <div class="drop-zone-content">
                            <span class="upload-icon">📸</span>
                            <p>Click or Drag Image</p>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="encrypt-password">Access Code (Password)</label>
                    <input type="password" id="encrypt-password" placeholder="Define security clearance...">
                </div>

                <div class="action-area">
                    <button id="btn-initiate" class="primary-btn">
                        <span class="btn-text">INITIATE ENCRYPTION</span>
                        <span class="btn-glitch"></span>
                    </button>
                </div>

                <div class="output-area hidden" id="sender-output">
                    <label>Intelligence Key (Share these emojis)</label>
                    <div class="emoji-result-container">
                        <div id="emoji-key-display" class="emoji-key"></div>
                        <button id="btn-copy-emojis" class="icon-btn" title="Copy Key">📋</button>
                    </div>
                    <p class="status-msg">⚠️ Self-destructs after 1 view or 7 days.</p>
                </div>
            </section>

            <!-- RECEIVER SECTION -->
            <section class="pane receiver-pane" id="receiver-section">
                <div class="pane-header">
                    <span class="icon">🔓</span>
                    <h2>Agent Receiver</h2>
                </div>

                <div class="input-group">
                    <label for="emoji-input">Decryption Key (Paste Emojis)</label>
                    <input type="text" id="emoji-input" placeholder="Paste intelligence emojis...">
                </div>

                <div class="input-group">
                    <label for="decrypt-password">Access Code (Password)</label>
                    <input type="password" id="decrypt-password" placeholder="Enter security clearance...">
                </div>

                <div class="action-area">
                    <button id="btn-decrypt" class="secondary-btn">
                        <span class="btn-text">DECRYPT INTELLIGENCE</span>
                    </button>
                </div>

                <div class="display-area hidden" id="receiver-display">
                    <label>Intelligence Restored</label>
                    <div class="image-preview-container">
                        <img id="decrypted-image" src="" alt="Intelligence Data">
                    </div>
                    <button id="btn-download" class="text-link">Save Intelligence</button>
                </div>
            </section>
        </div>

        <footer class="app-footer">
            <p class="crypto-status">System Status: <span class="status-online">ENCRYPTION_ACTIVE</span></p>
            <p class="disclaimer">End-to-End Encrypted | No Data Stored on Servers</p>
        </footer>
    </main>

    <!-- Global Loading Overlay -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="loader">
            <div class="spinner"></div>
            <p id="loading-text">Encrypting Intelligence...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
